[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
  "@openzeppelin/=lib/openzeppelin-contracts/",
  "contracts/=src/contracts/",
  "interfaces/=src/interfaces/",
]

# Compiler settings
solc = "0.8.30"
via_ir = false
optimizer = true
optimizer_runs = 1000000
evm_version = "cancun"

deny = "warnings"
# Vendored dependencies are not held to deny = "warnings" (e.g. newer solc
# versions warn inside OpenZeppelin sources we don't control).
ignored_warnings_from = ["lib"]

[lint]
exclude_lints = ["block-timestamp", "erc20-unchecked-transfer"]

[fmt]
line_length = 120
tab_width = 2
bracket_spacing = false
int_types = 'long'
quote_style = 'single'
number_underscore = 'thousands'
multiline_func_header = 'params_first'
sort_imports = true

[profile.ci]
fuzz.seed = '0'
